<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epson Receipt Printer Control</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1, h2 { margin-bottom: 1rem; color: #333; }
        .section { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input[type="file"], input[type="text"] { border: 1px solid #ccc; padding: 10px; border-radius: 4px; width: calc(100% - 22px); }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #0056b3; }
        .message { margin-top: 1rem; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        
        #meme-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 1rem; }
        .meme-item { cursor: pointer; border: 2px solid transparent; transition: border 0.2s; text-align: center; }
        .meme-item:hover { border-color: #007bff; }
        .meme-item img { width: 100%; border-radius: 4px; }
        .meme-item p { font-size: 0.8rem; margin: 5px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Printer Control</h1>

        {% if message %}
            <div class="message {{ 'success' if 'Success' in message else 'error' }}">
                {{ message }}
            </div>
        {% endif %}

        <!-- Section 1: Local Upload -->
        <div class="section">
            <h2>Upload Image</h2>
            <form action="/upload" method="post" enctype="multipart/form-data">
                <input type="file" name="file" accept="image/*" required>
                <button type="submit">Print Uploaded</button>
            </form>
        </div>

        <!-- Section 2: Print from URL -->
        <div class="section">
            <h2>Print from URL</h2>
            <form action="/print-url" method="post">
                <input type="text" name="url" placeholder="Paste image URL here (e.g., https://.../image.jpg)" required>
                <button type="submit">Download & Print</button>
            </form>
        </div>

        <!-- Section 3: Cat Generator -->
        <div class="section">
            <h2>Cat Generator</h2>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="cat-caption" placeholder="Enter a caption (optional)...">
                <button onclick="generateCat()">Generate Cat</button>
            </div>
            <div id="cat-preview" style="margin-top: 1rem; display: none; text-align: center;">
                <img id="cat-image" style="max-width: 100%; border-radius: 4px; margin-bottom: 1rem;">
                <button id="print-cat-btn" onclick="printGeneratedCat()">Print This Cat</button>
            </div>
        </div>
    </div>

    <script>
        let currentCatBlob = null;

        async function generateCat() {
            const caption = document.getElementById('cat-caption').value.trim();
            const previewDiv = document.getElementById('cat-preview');
            const catImg = document.getElementById('cat-image');
            const generateBtn = document.querySelector('button[onclick="generateCat()"]');
            
            generateBtn.disabled = true;
            generateBtn.innerText = 'Fetching...';
            
            try {
                // Construct CATAAS URL with type=square for better printer results
                const baseUrl = 'https://cataas.com/cat';
                const url = caption 
                    ? `${baseUrl}/says/${encodeURIComponent(caption)}`
                    : `${baseUrl}`;
                
                // Fetch the image as a blob on the frontend to ensure we have the EXACT same data for printing
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch cat');
                
                currentCatBlob = await response.blob();
                
                // Revoke old URL if it exists to free memory
                if (catImg.src.startsWith('blob:')) {
                    URL.revokeObjectURL(catImg.src);
                }
                
                catImg.src = URL.createObjectURL(currentCatBlob);
                previewDiv.style.display = 'block';
            } catch (err) {
                alert('Error generating cat: ' + err.message);
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = 'Generate Cat';
            }
        }

        async function printGeneratedCat() {
            if (!currentCatBlob) return;
            if (!confirm('Print this cat?')) return;
            
            const printBtn = document.getElementById('print-cat-btn');
            printBtn.disabled = true;
            printBtn.innerText = 'Printing...';
            
            try {
                const formData = new FormData();
                // Send the blob as a file to the existing /upload endpoint
                formData.append('file', currentCatBlob, 'cat.jpg');
                
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.redirected) {
                    window.location.href = response.url;
                } else {
                    const result = await response.text();
                    alert('Print request sent!');
                    window.location.reload();
                }
            } catch (err) {
                alert('Error printing cat: ' + err.message);
                printBtn.disabled = false;
                printBtn.innerText = 'Print This Cat';
            }
        }
    </script>
</body>
</html>
